<!DOCTYPE html><html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Offline</title><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/><style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
-webkit-tap-highlight-color:transparent;
}

body{
background:#050505;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
color:white;
padding:20px;
}

.bg{
position:fixed;
inset:0;
background:
radial-gradient(circle at top left,#00aaff25,transparent 35%),
radial-gradient(circle at bottom right,#005eff25,transparent 35%);
z-index:-1;
animation:bgMove 8s linear infinite alternate;
}

@keyframes bgMove{
0%{
transform:scale(1);
}
100%{
transform:scale(1.1);
}
}

.card{
width:100%;
max-width:430px;
background:rgba(18,18,18,.85);
border:1px solid rgba(255,255,255,.05);
backdrop-filter:blur(14px);
padding:30px 24px;
border-radius:35px;
text-align:center;
box-shadow:
0 0 40px rgba(0,0,0,.45);
animation:fade .5s ease;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(20px);
}

to{
opacity:1;
transform:translateY(0);
}
}

.icon{
width:120px;
height:120px;
margin:auto;
border-radius:35px;
background:linear-gradient(135deg,#00c6ff,#005eff);
display:flex;
align-items:center;
justify-content:center;
font-size:55px;
margin-bottom:22px;
box-shadow:
0 0 35px rgba(0,170,255,.4),
0 0 70px rgba(0,94,255,.2);
animation:float 3s ease-in-out infinite;
}

@keyframes float{
50%{
transform:translateY(-8px);
}
}

h1{
font-size:34px;
font-weight:800;
margin-bottom:10px;
}

p{
font-size:13px;
line-height:1.8;
opacity:.75;
margin-bottom:25px;
}

.status{
display:inline-flex;
align-items:center;
gap:8px;
padding:10px 16px;
border-radius:16px;
background:#2a1010;
color:#ff6b6b;
font-size:13px;
font-weight:700;
margin-bottom:25px;
}

.btn{
width:100%;
padding:17px;
border:none;
border-radius:18px;
background:linear-gradient(135deg,#00c6ff,#005eff);
color:white;
font-size:15px;
font-weight:700;
cursor:pointer;
transition:.25s;
box-shadow:
0 0 25px rgba(0,114,255,.35);
}

.btn:active{
transform:scale(.98);
}

.footer{
margin-top:20px;
font-size:11px;
opacity:.45;
}

</style></head>
<body><div class="bg"></div><div class="card"><div class="icon">
<i class="fa-solid fa-wifi"></i>
</div><div class="status">
<i class="fa-solid fa-circle-exclamation"></i>
SERVER OFFLINE
</div><h1>Koneksi Terputus</h1><p>
Website sedang offline atau koneksi internet kamu bermasalah.<br>
Silahkan cek jaringan lalu coba lagi.
</p><button class="btn" onclick="reloadPage()">
<i class="fa-solid fa-rotate-right"></i>
 Refresh Halaman
</button><div class="footer">
Powered By RapzzGanteng
</div></div><script>

function reloadPage(){
location.reload();
}

window.addEventListener('online',()=>{
location.reload();
});

</script></body>
</html>
