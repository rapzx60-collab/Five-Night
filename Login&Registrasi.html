<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1.0">

<title>Rapzz Auth System</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;

background:
radial-gradient(circle at top,
#202020,
#000);

overflow:hidden;
padding:20px;
color:white;
}

/* BG EFFECT */

.bg-blur{
position:fixed;
width:350px;
height:350px;
border-radius:50%;
filter:blur(120px);
opacity:.25;
z-index:-1;
}

.bg1{
background:#ffffff;
top:-120px;
left:-100px;
}

.bg2{
background:#777;
bottom:-120px;
right:-100px;
}

/* INTRO */

.intro{
position:fixed;
inset:0;
background:#000;
display:none;
justify-content:center;
align-items:center;
z-index:99999;
overflow:hidden;
}

.intro video{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
}

.overlay{
position:absolute;
inset:0;

background:
linear-gradient(
to top,
rgba(0,0,0,.95),
rgba(0,0,0,.3)
);

}

.intro-content{
position:relative;
z-index:5;
text-align:center;
padding:20px;
animation:fadeUp 1s ease;
}

.intro-title{
font-size:40px;
font-weight:800;
margin-bottom:10px;
}

.intro-text{
font-size:14px;
opacity:.8;
margin-bottom:25px;
}

.skip-btn{
display:none;

padding:15px 30px;

border:none;
border-radius:18px;

background:white;
color:black;

font-size:15px;
font-weight:700;

cursor:pointer;

box-shadow:
0 0 25px rgba(255,255,255,.35);
}

.progress{
position:absolute;
bottom:0;
left:0;
height:5px;
width:0%;
background:white;
z-index:10;
transition:.2s;
}

/* CARD */

.container{
width:100%;
max-width:430px;

background:
rgba(20,20,20,.93);

border:
1px solid rgba(255,255,255,.08);

border-radius:32px;

padding:32px;

backdrop-filter:blur(15px);

box-shadow:
0 20px 60px rgba(0,0,0,.65);

animation:fadeUp .8s ease;
}

/* ICON */

.login-icon{
width:100px;
height:100px;

margin:0 auto 20px;

border-radius:28px;
padding:12px;

background:
linear-gradient(
135deg,
rgba(255,255,255,.14),
rgba(255,255,255,.04)
);

border:
1px solid rgba(255,255,255,.1);

box-shadow:
0 15px 40px rgba(0,0,0,.45);

display:flex;
justify-content:center;
align-items:center;

animation:float 3s ease-in-out infinite;
}

.login-icon img{
width:100%;
height:100%;
object-fit:cover;
border-radius:22px;
}

/* TITLE */

.title{
font-size:34px;
font-weight:800;
text-align:center;
margin-bottom:5px;
}

.desc{
text-align:center;
font-size:13px;
opacity:.7;
margin-bottom:28px;
}

/* TAB */

.tab{
display:flex;
background:#111;
padding:5px;
border-radius:18px;
margin-bottom:25px;
}

.tab button{
flex:1;
padding:14px;

border:none;
background:transparent;

color:#aaa;

font-weight:700;

border-radius:14px;

cursor:pointer;
transition:.25s;
}

.tab button.active{
background:white;
color:black;
}

/* FORM */

.form{
display:none;
}

.form.active{
display:block;
}

.input{
margin-bottom:16px;
position:relative;
}

input{
width:100%;
padding:16px;

border:none;
outline:none;

border-radius:16px;

background:#0e0e0e;

color:white;

font-size:14px;

border:
1px solid rgba(255,255,255,.08);

transition:.25s;
}

input:focus{
border-color:white;

box-shadow:
0 0 0 4px rgba(255,255,255,.05);
}

/* BUTTON */

.btn{
width:100%;
padding:16px;

border:none;

border-radius:18px;

background:white;
color:black;

font-size:15px;
font-weight:700;

cursor:pointer;

transition:.25s;
}

.btn:hover{
opacity:.92;
}

.btn:active{
transform:scale(.98);
}

/* INFO */

.info{
margin-top:22px;
text-align:center;
font-size:12px;
opacity:.55;
}

/* NOTIF */

.notif{
position:fixed;
top:20px;
right:20px;

background:#111;

padding:15px 22px;

border-radius:16px;

border:
1px solid rgba(255,255,255,.08);

display:none;

font-size:13px;

z-index:999999;

animation:fadeUp .4s ease;
}

/* ANIM */

@keyframes fadeUp{

from{
opacity:0;
transform:translateY(30px);
}

to{
opacity:1;
transform:translateY(0);
}

}

@keyframes float{

0%{
transform:translateY(0px);
}

50%{
transform:translateY(-8px);
}

100%{
transform:translateY(0px);
}

}

/* MOBILE */

@media(max-width:480px){

.container{
padding:25px;
border-radius:28px;
}

.title{
font-size:28px;
}

.login-icon{
width:85px;
height:85px;
}

}

</style>
</head>

<body>

<div class="bg-blur bg1"></div>
<div class="bg-blur bg2"></div>

<!-- INTRO -->

<div class="intro" id="intro">

<video
id="introVideo"
playsinline>

<source
src="https://files.catbox.moe/mhk8do.mp4"
type="video/mp4">

</video>

<div class="overlay"></div>

<div class="intro-content">

<div
class="intro-title"
id="introTitle">
WELCOME
</div>

<div class="intro-text">
Sedang memuat dashboard...
</div>

<button
class="skip-btn"
id="skipBtn"
onclick="skipIntro()">
Skip Intro
</button>

</div>

<div
class="progress"
id="progress">
</div>

</div>

<!-- NOTIF -->

<div
class="notif"
id="notif">
</div>

<!-- LOGIN CARD -->

<div class="container">

<div class="login-icon">

<img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">

</div>

<div class="title">
RapzzStore
</div>

<div class="desc">
Login atau buat akun baru
</div>

<div class="tab">

<button
class="active"
onclick="switchForm('login')">
Login
</button>

<button
onclick="switchForm('register')">
Register
</button>

</div>

<!-- LOGIN -->

<form
id="loginForm"
class="form active">

<div class="input">

<input
type="text"
id="loginUser"
placeholder="Username"
maxlength="10">

</div>

<div class="input">

<input
type="password"
id="loginPass"
placeholder="Password">

</div>

<div class="input">

<input
type="password"
id="loginPin"
placeholder="Kode PIN">

</div>

<button class="btn">
Login
</button>

</form>

<!-- REGISTER -->

<form
id="registerForm"
class="form">

<div class="input">

<input
type="text"
id="regUser"
placeholder="Username"
maxlength="10">

</div>

<div class="input">

<input
type="text"
id="regName"
placeholder="Nama Lengkap">

</div>

<div class="input">

<input
type="password"
id="regPass"
placeholder="Password">

</div>

<div class="input">

<input
type="password"
id="regPin"
placeholder="Buat Kode PIN">

</div>

<button class="btn">
Register
</button>

</form>

<div class="info">
© RapzzGanteng
</div>

</div>

<script>

/* VIDEO */

const introVideoUrl =
"https://files.catbox.moe/mhk8do.mp4";

document.querySelector(
'#introVideo source'
).src = introVideoUrl;

document
.getElementById(
'introVideo'
).load();

/* REDIRECT */

let redirectPage = "";

/* SWITCH FORM */

function switchForm(type){

document
.querySelectorAll('.form')
.forEach(f=>{

f.classList.remove('active');

});

document
.querySelectorAll('.tab button')
.forEach(b=>{

b.classList.remove('active');

});

if(type === 'login'){

document
.getElementById('loginForm')
.classList.add('active');

document
.querySelectorAll('.tab button')[0]
.classList.add('active');

}else{

document
.getElementById('registerForm')
.classList.add('active');

document
.querySelectorAll('.tab button')[1]
.classList.add('active');

}

}

/* NOTIF */

function showNotif(msg){

const notif =
document.getElementById('notif');

notif.innerText = msg;

notif.style.display = 'block';

setTimeout(()=>{

notif.style.display = 'none';

},2500);

}

/* INTRO */

function showIntro(page,user){

redirectPage = page;

const intro =
document.getElementById('intro');

const video =
document.getElementById('introVideo');

const skipBtn =
document.getElementById('skipBtn');

const progress =
document.getElementById('progress');

intro.style.display = 'flex';

document
.getElementById('introTitle')
.innerText =
`WELCOME ${user}`;

skipBtn.style.display = 'none';

progress.style.width = '0%';

video.currentTime = 0;

video.muted = false;

video.play()
.catch(()=>{

video.muted = true;
video.play();

});

video.ontimeupdate = ()=>{

const percent =
(video.currentTime /
video.duration) * 100;

progress.style.width =
percent + "%";

if(percent >= 50){

skipBtn.style.display =
'inline-block';

}

};

video.onended = ()=>{

window.location.href =
redirectPage;

};

}

/* SKIP */

function skipIntro(){

window.location.href =
redirectPage;

}

/* LIMIT USERNAME */

document
.getElementById('regUser')

.addEventListener('input',function(){

if(this.value.length > 10){

this.value =
this.value.slice(0,10);

}

});

document
.getElementById('loginUser')

.addEventListener('input',function(){

if(this.value.length > 10){

this.value =
this.value.slice(0,10);

}

});

/* REGISTER */

document
.getElementById('registerForm')

.addEventListener('submit',e=>{

e.preventDefault();

const user =
document.getElementById('regUser').value;

const name =
document.getElementById('regName').value;

const pass =
document.getElementById('regPass').value;

const pin =
document.getElementById('regPin').value;

if(!user || !name || !pass || !pin){

showNotif(
"Isi semua data!"
);

return;

}

if(pin.length < 4){

showNotif(
"PIN minimal 4 angka!"
);

return;

}

localStorage.setItem(

"userAccount",

JSON.stringify({

username:user,

fullname:name,

password:pass,

pin:pin,

role:"user"

})

);

showNotif(
"Register berhasil!"
);

switchForm('login');

});

/* INTERNET */

function checkInternet(){

if(!navigator.onLine){

window.location.href =
"offline.html";

}

}

checkInternet();

window.addEventListener(
'offline',
()=>{

window.location.href =
"offline.html";

}
);

setInterval(
checkInternet,
3000
);

/* LOGIN */

document
.getElementById('loginForm')

.addEventListener('submit',e=>{

e.preventDefault();

const user =
document.getElementById('loginUser').value;

const pass =
document.getElementById('loginPass').value;

const pin =
document.getElementById('loginPin').value;

/* ADMIN */

if(

user === "AdminRapzz"

&&

pass === "RapzzGanteng"

&&

pin === "290859"

){

showNotif(
"Login Admin sukses!"
);

localStorage.setItem(
"role",
"admin"
);

localStorage.setItem(
"username",
user
);

setTimeout(()=>{

showIntro(
"DashboardAdmin.html",
user
);

},1000);

return;

}

/* USER */

const data = JSON.parse(
localStorage.getItem(
"userAccount"
)
);

if(!data){

showNotif(
"Akun belum ada!"
);

return;

}

if(

user === data.username

&&

pass === data.password

&&

pin === data.pin

){

localStorage.setItem(
"username",
user
);

showNotif(
"Login sukses!"
);

localStorage.setItem(
"role",
"user"
);

localStorage.setItem(
"username",
user
);

setTimeout(()=>{

showIntro(
"Dashboard.html",
user
);

},1000);

}else{

showNotif(
"Username / Password / PIN salah!"
);

}

});

</script>

</body>
</html>
