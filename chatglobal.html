<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1.0,
maximum-scale=1.0,
user-scalable=no">

<title>Rapzz Global Chat</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
-webkit-tap-highlight-color:transparent;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
background:#050505;
color:white;
}

/* BG */

.bg{
position:fixed;
inset:0;
overflow:hidden;
z-index:-1;
}

.glow{
position:absolute;
border-radius:50%;
filter:blur(90px);
opacity:.15;
animation:float 8s ease-in-out infinite;
}

.glow:nth-child(1){
width:260px;
height:260px;
background:#ff0000;
top:-120px;
left:-100px;
}

.glow:nth-child(2){
width:260px;
height:260px;
background:#ff3d3d;
bottom:-120px;
right:-100px;
animation-delay:2s;
}

.glow:nth-child(3){
width:180px;
height:180px;
background:#ff5f5f;
top:40%;
left:35%;
animation-delay:1s;
}

@keyframes float{
50%{
transform:translateY(-18px);
}
}

/* APP */

.app{
position:fixed;
inset:0;
display:flex;
flex-direction:column;
}

/* HEADER */

.header{
height:65px;
padding:0 14px;

display:flex;
align-items:center;
justify-content:space-between;

background:
rgba(10,10,10,.92);

backdrop-filter:blur(15px);

border-bottom:
1px solid rgba(255,255,255,.05);
}

.left-head{
display:flex;
align-items:center;
gap:10px;
}

.logo{
width:42px;
height:42px;

border-radius:14px;

display:flex;
align-items:center;
justify-content:center;

background:
linear-gradient(
135deg,
#ff0000,
#ff3d3d
);

font-size:16px;

box-shadow:
0 0 25px #ff000040;
}

.title{
font-size:15px;
font-weight:700;
}

.online{
font-size:10px;
opacity:.6;
margin-top:1px;
}

.back-btn{
width:40px;
height:40px;

border:none;
outline:none;

border-radius:13px;

background:#111;

color:white;

font-size:15px;

display:flex;
align-items:center;
justify-content:center;

border:
1px solid rgba(255,255,255,.05);

cursor:pointer;
}

/* CHAT */

.chat-area{
flex:1;
overflow-y:auto;

padding:12px;

-webkit-overflow-scrolling:touch;
}

.chat-area::-webkit-scrollbar{
display:none;
}

.message{
margin-bottom:12px;
animation:fade .18s ease;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(10px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.message-top{
display:flex;
align-items:center;
gap:8px;
margin-bottom:5px;
}

.avatar{
width:34px;
height:34px;

border-radius:11px;

display:flex;
align-items:center;
justify-content:center;

background:
linear-gradient(
135deg,
#ff0000,
#ff3d3d
);

font-size:12px;
font-weight:700;
}

.user-wrap{
display:flex;
flex-direction:column;
}

.username{
font-size:12px;
font-weight:700;
}

.time{
font-size:9px;
opacity:.5;
}

/* USER COLORS */

.user-1{
color:#ff7070;
}

.user-2{
color:#70a1ff;
}

.user-3{
color:#7bed9f;
}

.user-4{
color:#ffa502;
}

.user-5{
color:#ff6bff;
}

/* ADMIN RGB */

.admin{
background:
linear-gradient(
90deg,
red,
orange,
yellow,
lime,
cyan,
blue,
violet,
red
);

background-size:400%;

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

animation:rainbow 5s linear infinite;
}

@keyframes rainbow{
100%{
background-position:400%;
}
}

/* BUBBLE */

.bubble{
margin-left:42px;

background:
rgba(17,17,17,.95);

border:
1px solid rgba(255,255,255,.05);

padding:10px 11px;

border-radius:
0 15px 15px 15px;

font-size:12px;
line-height:1.5;

word-break:break-word;

max-width:84%;
}

.reply-box{
padding:7px 8px;

border-radius:10px;

background:#1a1a1a;

border-left:
3px solid #ff3d3d;

font-size:10px;

margin-bottom:7px;
}

.msg-img{
width:100%;
max-width:190px;

border-radius:12px;

margin-top:8px;

display:block;
}

.save-btn{
margin-top:8px;

padding:8px 11px;

border:none;
outline:none;

border-radius:11px;

background:
linear-gradient(
135deg,
#ff0000,
#ff3d3d
);

color:white;

font-size:10px;
font-weight:600;

display:flex;
align-items:center;
justify-content:center;
gap:6px;
}

/* INPUT */

.input-wrap{
padding:10px 12px
calc(10px + env(safe-area-inset-bottom));

background:
rgba(10,10,10,.92);

backdrop-filter:blur(15px);

border-top:
1px solid rgba(255,255,255,.05);
}

.image-ready{
display:none;

align-items:center;
gap:7px;

padding:9px 11px;

border-radius:11px;

background:
rgba(255,0,0,.12);

border:
1px solid rgba(255,0,0,.25);

font-size:10px;

margin-bottom:8px;

color:#ff7b7b;
}

.reply-preview{
display:none;

padding:8px 10px;

border-radius:11px;

background:#111;

border-left:
3px solid #ff3d3d;

font-size:10px;

margin-bottom:8px;
}

.input-box{
display:flex;
align-items:flex-end;
gap:8px;
}

.photo-btn{
width:42px;
height:42px;

border:none;
outline:none;

border-radius:13px;

background:#111;

color:white;

font-size:15px;

display:flex;
align-items:center;
justify-content:center;

border:
1px solid rgba(255,255,255,.05);
}

.text-input{
flex:1;

min-height:42px;
max-height:90px;

padding:11px 13px;

border:none;
outline:none;

resize:none;

border-radius:14px;

background:#111;

color:white;

font-size:12px;

border:
1px solid rgba(255,255,255,.05);

overflow-y:auto;
}

.send-btn{
width:46px;
height:42px;

border:none;
outline:none;

border-radius:13px;

background:
linear-gradient(
135deg,
#ff0000,
#ff3d3d
);

color:white;

font-size:15px;

display:flex;
align-items:center;
justify-content:center;
}

/* MODAL */

.modal{
position:fixed;
inset:0;

background:
rgba(0,0,0,.75);

display:none;
align-items:center;
justify-content:center;

z-index:999;
}

.modal-box{
width:90%;
max-width:260px;

background:#111;

border-radius:20px;

padding:17px;

border:
1px solid rgba(255,255,255,.05);
}

.modal-title{
font-size:15px;
font-weight:700;
margin-bottom:13px;
text-align:center;
}

.modal-btn{
width:100%;

padding:12px;

border:none;
outline:none;

border-radius:12px;

background:#1b1b1b;

color:white;

font-size:11px;
font-weight:600;

margin-bottom:9px;

cursor:pointer;
}

.modal-btn.red{
background:
linear-gradient(
135deg,
#ff0000,
#ff3d3d
);
}

</style>
</head>

<body>

<div class="bg">
<div class="glow"></div>
<div class="glow"></div>
<div class="glow"></div>
</div>

<div class="app">

<!-- HEADER -->

<div class="header">

<div class="left-head">

<div class="logo">
<i class="fa-solid fa-earth-asia"></i>
</div>

<div>

<div class="title">
Global Chat
</div>

<div
class="online"
id="typingInfo">
Tidak ada yang mengetik
</div>

</div>

</div>

<button
class="back-btn"
onclick="backDashboard()">

<i class="fa-solid fa-arrow-left"></i>

</button>

</div>

<!-- CHAT -->

<div
class="chat-area"
id="chatArea">
</div>

<!-- INPUT -->

<div class="input-wrap">

<div
class="image-ready"
id="imageReady">

<i class="fa-solid fa-image"></i>
Foto siap dikirim

</div>

<div
class="reply-preview"
id="replyPreview">
</div>

<div class="input-box">

<button
class="photo-btn"
onclick="pickImage()">

<i class="fa-solid fa-image"></i>

</button>

<textarea
id="messageInput"
class="text-input"
placeholder="Tulis pesan..."
rows="1"></textarea>

<button
class="send-btn"
onclick="sendMessage()">

<i class="fa-solid fa-paper-plane"></i>

</button>

<input
type="file"
id="imageInput"
accept="image/*"
hidden>

</div>

</div>

</div>

<!-- MODAL -->

<div
class="modal"
id="menuModal">

<div class="modal-box">

<div class="modal-title">
Menu Pesan
</div>

<button
class="modal-btn red"
onclick="replyMessage()">

<i class="fa-solid fa-reply"></i>
Balas Pesan

</button>

<!-- KHUSUS ADMIN -->

<div id="adminMenu"></div>

<button
class="modal-btn"
onclick="closeModal()">

Tutup

</button>

</div>

</div>

<script>

/* USER */

const username =
localStorage.getItem("username")
|| "Guest";

const role =
localStorage.getItem("role")
|| "user";

/* STORAGE */

if(
!localStorage.getItem(
"globalMessages"
)
){
localStorage.setItem(
"globalMessages",
JSON.stringify([])
);
}

/* ELEMENT */

const chatArea =
document.getElementById("chatArea");

const input =
document.getElementById("messageInput");

const imageInput =
document.getElementById("imageInput");

const typingInfo =
document.getElementById("typingInfo");

const replyPreview =
document.getElementById("replyPreview");

const imageReady =
document.getElementById("imageReady");

/* DATA */

let selectedMsg = null;
let replyData = null;

/* USER COLOR */

function getUserClass(name){

if(
name.toLowerCase()
.includes("admin")
){
return "admin";
}

const colors = [
"user-1",
"user-2",
"user-3",
"user-4",
"user-5"
];

let total = 0;

for(let i=0;i<name.length;i++){
total += name.charCodeAt(i);
}

return colors[
total % colors.length
];

}

/* WATERMARK */

function addWatermark(base64){

return new Promise(resolve=>{

const img = new Image();

img.onload = function(){

const canvas =
document.createElement("canvas");

const maxWidth = 700;

const scale =
maxWidth / img.width;

canvas.width = maxWidth;

canvas.height =
img.height * scale;

const ctx =
canvas.getContext("2d");

ctx.drawImage(
img,
0,
0,
canvas.width,
canvas.height
);

ctx.font =
`${Math.floor(canvas.width/25)}px Poppins`;

ctx.fillStyle =
"rgba(255,255,255,.55)";

ctx.textAlign = "right";

ctx.fillText(
"RapzzGanteng",
canvas.width - 15,
canvas.height - 15
);

resolve(
canvas.toDataURL(
"image/jpeg",
0.45
)
);

};

img.src = base64;

});

}

/* DOWNLOAD */

function downloadImage(src){

const a =
document.createElement("a");

a.href = src;

a.download =
"RapzzGanteng.jpg";

a.click();

}

/* RENDER */

function renderMessages(){

const messages =
JSON.parse(
localStorage.getItem(
"globalMessages"
)
) || [];

chatArea.innerHTML = "";

messages.forEach(msg=>{

const div =
document.createElement("div");

div.className = "message";

let replyHTML = "";
let imgHTML = "";
let saveBtn = "";

if(msg.reply){

replyHTML = `
<div class="reply-box">
<b>${msg.reply.user}</b><br>
${msg.reply.text}
</div>
`;

}

if(msg.image){

imgHTML = `
<img
src="${msg.image}"
class="msg-img">
`;

saveBtn = `
<button
class="save-btn"
onclick="downloadImage('${msg.image}')">

<i class="fa-solid fa-download"></i>
Simpan Foto

</button>
`;

}

div.innerHTML = `

<div class="message-top">

<div class="avatar">
${msg.user.charAt(0).toUpperCase()}
</div>

<div class="user-wrap">

<div class="username ${getUserClass(msg.user)}">
${msg.user}
</div>

<div class="time">
${msg.time}
</div>

</div>

</div>

<div class="bubble">

${replyHTML}

<div>
${msg.text || ""}
</div>

${imgHTML}

${saveBtn}

</div>

`;

div.querySelector(".bubble")
.onclick = ()=> openMenu(msg);

chatArea.appendChild(div);

});

setTimeout(()=>{

chatArea.scrollTop =
chatArea.scrollHeight;

},50);

}

/* SEND */

async function sendMessage(){

const text =
input.value.trim();

let image =
imageInput.dataset.image || "";

if(!text && !image){
return;
}

if(image){

image =
await addWatermark(image);

}

const messages =
JSON.parse(
localStorage.getItem(
"globalMessages"
)
) || [];

/* LIMIT */

if(messages.length >= 40){
messages.shift();
}

messages.push({

user:username,

role:role,

text:text,

image:image,

reply:replyData,

time:new Date()
.toLocaleTimeString(
'id-ID',
{
hour:'2-digit',
minute:'2-digit'
}
)

});

try{

localStorage.setItem(
"globalMessages",
JSON.stringify(messages)
);

}catch{

alert(
"Storage penuh, chat lama dibersihkan"
);

localStorage.removeItem(
"globalMessages"
);

localStorage.setItem(
"globalMessages",
JSON.stringify([
messages[messages.length-1]
])
);

}

/* RESET */

input.value = "";

input.style.height =
"42px";

imageInput.value = "";

imageInput.dataset.image = "";

imageReady.style.display =
"none";

replyData = null;

replyPreview.style.display =
"none";

renderMessages();

input.focus();

}

/* IMAGE */

function pickImage(){
imageInput.click();
}

imageInput.addEventListener(
"change",
function(){

const file =
this.files[0];

if(!file){
return;
}

const reader =
new FileReader();

reader.onload = function(e){

imageInput.dataset.image =
e.target.result;

imageReady.style.display =
"flex";

};

reader.readAsDataURL(file);

}
);

/* AUTO HEIGHT */

input.addEventListener(
"input",
function(){

this.style.height =
"42px";

this.style.height =
Math.min(
this.scrollHeight,
90
) + "px";

updateTypingUser();

}
);

/* ENTER */

input.addEventListener(
"keydown",
function(e){

if(
e.key === "Enter"
&&
!e.shiftKey
){

e.preventDefault();

sendMessage();

}

}
);

/* TYPING */

let typingTimeout;

function updateTypingUser(){

let typing =
JSON.parse(
localStorage.getItem(
"typingUsers"
)
) || [];

if(
!typing.includes(username)
){
typing.push(username);
}

localStorage.setItem(
"typingUsers",
JSON.stringify(typing)
);

clearTimeout(typingTimeout);

typingTimeout = setTimeout(()=>{

let typing =
JSON.parse(
localStorage.getItem(
"typingUsers"
)
) || [];

typing = typing.filter(
x => x !== username
);

localStorage.setItem(
"typingUsers",
JSON.stringify(typing)
);

},1500);

}

function updateTyping(){

let typing =
JSON.parse(
localStorage.getItem(
"typingUsers"
)
) || [];

typing = typing.filter(
x => x !== username
);

if(typing.length <= 0){

typingInfo.innerText =
"Tidak ada yang mengetik";

}else{

typingInfo.innerText =
typing.join(", ")
+ " sedang mengetik...";

}

}

/* MODAL */

function openMenu(msg){

selectedMsg = msg;

renderAdminMenu();

document
.getElementById("menuModal")
.style.display = "flex";

}

function closeModal(){

document
.getElementById("menuModal")
.style.display = "none";

}

/* REPLY */

function replyMessage(){

if(!selectedMsg){
return;
}

replyData = {

user:selectedMsg.user,

text:selectedMsg.text
|| "Foto"

};

replyPreview.style.display =
"block";

replyPreview.innerHTML = `

<b>Membalas:</b><br>
${selectedMsg.user}: ${selectedMsg.text || "Foto"}

`;

closeModal();

input.focus();

}

/* KHUSUS ADMIN */

function renderAdminMenu(){

const adminMenu =
document.getElementById("adminMenu");

if(role !== "admin"){

adminMenu.innerHTML = "";
return;

}

adminMenu.innerHTML = `

<button
class="modal-btn"
onclick="deleteMessage()">

<i class="fa-solid fa-trash"></i>
Hapus Chat Ini

</button>

<button
class="modal-btn"
onclick="clearAllChat()">

<i class="fa-solid fa-broom"></i>
Clear Semua Chat

</button>

`;

}

/* DELETE 1 */

function deleteMessage(){

if(role !== "admin"){
return;
}

let messages =
JSON.parse(
localStorage.getItem(
"globalMessages"
)
) || [];

messages = messages.filter(
m =>
!(
m.user === selectedMsg.user
&&
m.time === selectedMsg.time
&&
m.text === selectedMsg.text
)
);

localStorage.setItem(
"globalMessages",
JSON.stringify(messages)
);

closeModal();
renderMessages();

}

/* CLEAR ALL */

function clearAllChat(){

if(role !== "admin"){
return;
}

const yakin =
confirm(
"Yakin mau hapus semua chat?"
);

if(!yakin){
return;
}

localStorage.setItem(
"globalMessages",
JSON.stringify([])
);

closeModal();
renderMessages();

}

/* BACK */

function backDashboard(){

if(role === "admin"){

window.location.href =
"DashboardAdmin.html";

}else{

window.location.href =
"Dashboard.html";

}

}

/* REALTIME */

window.addEventListener(
"storage",
function(e){

if(
e.key === "globalMessages"
){
renderMessages();
}

if(
e.key === "typingUsers"
){
updateTyping();
}

});

/* CEK BANNED */

function checkBanned(){

const username =
localStorage.getItem("username");

if(!username){
return;
}

const bannedUsers = JSON.parse(
localStorage.getItem("bannedUsers")
) || [];

/* JIKA KENA BANNED */

if(bannedUsers.includes(username)){

/* OPTIONAL AUTO LOGOUT */

localStorage.removeItem("role");

/* PINDAH KE HALAMAN BANNED */

window.location.href = "banned.html";

}

}

/* CEK SAAT HALAMAN DIBUKA */

checkBanned();

/* CEK REALTIME */

setInterval(checkBanned,1000);

/* CLOSE MODAL */

window.addEventListener(
"click",
function(e){

const modal =
document.getElementById(
"menuModal"
);

if(e.target === modal){
closeModal();
}

});

/* START */

renderMessages();
updateTyping();

</script>

</body>
</html>
